<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>美国西部行程地图 2026.8</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d0d1a;font-family:'Inter','SF Pro','Segoe UI',sans-serif;color:#e0e0e0;height:100vh;display:flex}

/* Sidebar */
#sidebar{
  width:340px;min-width:340px;
  background:#12121f;
  border-right:1px solid rgba(255,255,255,.06);
  display:flex;flex-direction:column;
  overflow:hidden;z-index:2
}
#sidebar-header{
  padding:20px 20px 16px;
  border-bottom:1px solid rgba(255,255,255,.06);
  flex-shrink:0
}
#sidebar-header h1{font-size:18px;font-weight:800;color:#fff;margin-bottom:4px}
#sidebar-header .sub{font-size:12px;color:#818cf8}
#sidebar-header .meta{font-size:11px;color:#6b6b80;margin-top:4px}
#sidebar-content{flex:1;overflow-y:auto;padding:12px 0}
#sidebar-content::-webkit-scrollbar{width:4px}
#sidebar-content::-webkit-scrollbar-track{background:transparent}
#sidebar-content::-webkit-scrollbar-thumb{background:#2a2a3e;border-radius:2px}

.day-group{padding:0 16px;margin-bottom:8px}
.day-header{
  display:flex;align-items:center;gap:10px;
  padding:10px 12px;border-radius:8px;
  cursor:pointer;transition:background .15s;
  user-select:none
}
.day-header:hover{background:rgba(255,255,255,.04)}
.day-num{
  width:28px;height:28px;border-radius:6px;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:700;color:#fff;flex-shrink:0
}
.day-info{flex:1;min-width:0}
.day-label{font-size:13px;font-weight:600;color:#e0e0e0}
.day-route{font-size:11px;color:#6b6b80;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.day-toggle{color:#4a4a60;font-size:10px;transition:transform .2s}
.day-toggle.open{transform:rotate(180deg)}
.day-stops{display:none;padding:6px 12px 12px 42px}
.day-stops.open{display:block}
.stop-item{
  display:flex;align-items:flex-start;gap:8px;
  padding:6px 0;font-size:12px;line-height:1.5
}
.stop-dot{
  width:6px;height:6px;border-radius:50%;flex-shrink:0;
  margin-top:5px;
  box-shadow:0 0 0 2px rgba(13,13,26,.9)
}
.stop-text{flex:1;min-width:0}
.stop-name{color:#d0d0e0;font-weight:500}
.stop-time{color:#6b6b80;font-size:11px}

/* Map */
#map{flex:1;z-index:1}

/* Leaflet overrides */
.leaflet-control-zoom a{background:#1a1a2e!important;color:#e0e0e0!important;border-color:#333!important}
.leaflet-control-zoom a:hover{background:#242440!important}
.leaflet-popup-content-wrapper{
  background:#1a1a2e!important;color:#e0e0e0!important;
  border-radius:10px!important;box-shadow:0 8px 32px rgba(0,0,0,.6)!important;
  border:1px solid rgba(255,255,255,.08)
}
.leaflet-popup-tip{background:#1a1a2e!important}
.leaflet-popup-content{margin:10px 14px!important;font-size:13px;line-height:1.6}
.leaflet-popup-content strong{color:#818cf8}
.leaflet-popup-content .date{color:#f59e0b;font-weight:600}
.leaflet-popup-content .desc{color:#9090a8;font-size:12px;margin-top:3px}

.pin{
  width:26px;height:26px;border-radius:6px;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;color:#fff;flex-shrink:0;
  box-shadow:0 2px 6px rgba(0,0,0,.4);
  line-height:1
}
.pin-green{background:#10b981}
.pin-red{background:#ef4444}
.pin-purple{background:#6366f1}
.pin-amber{background:#f59e0b}
.pin-cyan{background:#06b6d4}
.pin-pink{background:#ec4899}
</style>
</head>
<body>

<div id="sidebar">
  <div id="sidebar-header">
    <h1>美国西部行程</h1>
    <div class="sub">2026年8月12日 → 8月22日</div>
    <div class="meta">康杰+白雪 (8/12-22) · 白文+Sybils (8/12-29)</div>
  </div>
  <div id="sidebar-content"></div>
</div>
<div id="map"></div>

<script>
const DAY_COLORS = {
  start: '#10b981', end: '#ef4444', stay: '#6366f1',
  day: '#f59e0b', flight: '#06b6d4', hospital: '#ec4899'
};
const PIN_CLASS = {
  start: 'pin-green', end: 'pin-red', stay: 'pin-purple',
  day: 'pin-amber', flight: 'pin-cyan', hospital: 'pin-pink'
};
const PIN_LABEL = {
  start: '▶', end: '■', stay: '●',
  day: '·', flight: '✈', hospital: '+'
};

const days = [
  {
    label: '8/12 周三 · 到达日',
    route: 'LAX → San Bernardino(午餐) → Montclair Hospital → Anaheim',
    color: '#10b981',
    icon: 'start',
    stops: [
      {name:'洛杉矶 LAX', lat:33.9416, lng:-118.4085, t:'抵达', desc:'抵达洛杉矶国际机场，取行李', icon:'start'},
      {name:'San Bernardino 午餐', lat:34.1083, lng:-117.2898, t:'途经午餐', desc:'驱车途中经停休息/午餐约1h', icon:'day'},
      {name:'Montclair Hospital Medical Center', lat:34.0815, lng:-117.6885, t:'途经', desc:'5000 San Bernardino St, Montclair, CA', icon:'hospital'},
      {name:'Anaheim 入住', lat:33.8366, lng:-117.9143, t:'住宿 5晚', desc:'入住酒店/Airbnb。迪士尼（8/13）环球（8/14）SD（8/16）的基地', icon:'stay'}
    ]
  },
  {
    label: '8/13 周四 · 迪士尼',
    route: '迪士尼乐园 + California Adventure',
    color: '#f59e0b',
    icon: 'day',
    stops: [
      {name:'迪士尼乐园', lat:33.8121, lng:-117.9190, t:'全天', desc:'迪士尼乐园 + California Adventure。Sybils 9岁', icon:'day'},
    ]
  },
  {
    label: '8/14 周五 · 环球+Caltech',
    route: '环球影城 → Caltech(傍晚) → 回Anaheim',
    color: '#f59e0b',
    icon: 'day',
    stops: [
      {name:'环球影城 Hollywood', lat:34.1381, lng:-118.3534, t:'上午~傍晚', desc:'环球影城 Studio Tour，适合全家', icon:'day'},
      {name:'Caltech 加州理工', lat:34.1377, lng:-118.1253, t:'傍晚', desc:'校园参观，AI方向', icon:'day'},
      {name:'Anaheim', lat:33.8366, lng:-117.9143, t:'住宿', desc:'', icon:'stay'}
    ]
  },
  {
    label: '8/15 周六 · 纯玩日',
    route: 'Santa Monica → Getty Center → Griffith Observatory',
    color: '#f59e0b',
    icon: 'day',
    stops: [
      {name:'Santa Monica Pier', lat:34.0095, lng:-118.4971, t:'上午', desc:'海滩/码头', icon:'day'},
      {name:'Getty Center', lat:34.0771, lng:-118.4748, t:'中午~下午', desc:'免费博物馆+花园，俯瞰LA全景', icon:'day'},
      {name:'Griffith Observatory', lat:34.1184, lng:-118.3004, t:'傍晚', desc:'天文台日落+夜景，Hollywood标志合影', icon:'day'},
      {name:'Anaheim', lat:33.8366, lng:-117.9143, t:'住宿', desc:'', icon:'stay'}
    ]
  },
  {
    label: '8/16 周日 · San Diego',
    route: 'Anaheim → San Diego Zoo → 回Anaheim',
    color: '#f59e0b',
    icon: 'day',
    stops: [
      {name:'San Diego Zoo', lat:32.7360, lng:-117.1510, t:'全天', desc:'世界著名动物园，开车约1.5h', icon:'day'},
      {name:'Anaheim', lat:33.8366, lng:-117.9143, t:'住宿', desc:'', icon:'stay'}
    ]
  },
  {
    label: '8/17 周一 · 飞黄石',
    route: 'Anaheim → LAX → 飞 Bozeman → 黄石',
    color: '#06b6d4',
    icon: 'flight',
    stops: [
      {name:'✈ LAX→Bozeman', lat:33.9416, lng:-118.4085, t:'上午出发', desc:'从Anaheim回LAX，飞往Bozeman', icon:'flight'},
      {name:'黄石国家公园', lat:44.6200, lng:-110.4900, t:'到达 3天2晚', desc:'入住后游下8字：老忠实/大棱镜/西拇指', icon:'stay'}
    ]
  },
  {
    label: '8/18 周二 · 黄石上8字',
    route: '猛犸热泉 → 黄石峡谷 → 高塔瀑布',
    color: '#f59e0b',
    icon: 'day',
    stops: [
      {name:'Old Faithful', lat:44.4605, lng:-110.8288, t:'', desc:'老忠实间歇泉', icon:'day'},
      {name:'Grand Prismatic Spring', lat:44.5250, lng:-110.8378, t:'', desc:'大棱镜彩泉', icon:'day'},
      {name:'Mammoth Hot Springs', lat:44.9666, lng:-110.7119, t:'', desc:'猛犸热泉梯田', icon:'day'},
      {name:'Grand Canyon of Yellowstone', lat:44.7183, lng:-110.4831, t:'', desc:'黄石大峡谷+Lower Falls', icon:'day'}
    ]
  },
  {
    label: '8/19 周三 · 飞St Paul',
    route: '黄石 → 飞 St Paul, MN → 朋友家',
    color: '#06b6d4',
    icon: 'flight',
    stops: [
      {name:'✈ 黄石→St Paul', lat:44.7400, lng:-110.4100, t:'下午', desc:'从Bozeman飞往明尼苏达', icon:'flight'},
      {name:'St Paul, MN', lat:44.9537, lng:-93.0899, t:'住宿 4晚', desc:'住朋友家。休整游览。8/22康杰白雪回国', icon:'end'}
    ]
  },
  {
    label: '8/20-22 周四~六 · St Paul',
    route: '休整游览 · 8/22康杰白雪回国',
    color: '#ef4444',
    icon: 'end',
    stops: [
      {name:'St Paul 休整', lat:44.9537, lng:-93.0899, t:'', desc:'明尼苏达休整+游览。8/22康杰+白雪飞回', icon:'end'}
    ]
  }
];

// Build sidebar
const sidebarEl = document.getElementById('sidebar-content');
days.forEach((day, di) => {
  const group = document.createElement('div');
  group.className = 'day-group';

  const header = document.createElement('div');
  header.className = 'day-header';
  header.innerHTML = `
    <div class="day-num" style="background:${day.color}">${di+1}</div>
    <div class="day-info">
      <div class="day-label">${day.label}</div>
      <div class="day-route">${day.route}</div>
    </div>
    <div class="day-toggle open">▼</div>
  `;

  const stopsDiv = document.createElement('div');
  stopsDiv.className = 'day-stops open';

  day.stops.forEach(s => {
    const item = document.createElement('div');
    item.className = 'stop-item';
    item.dataset.lat = s.lat;
    item.dataset.lng = s.lng;
    item.style.cursor = 'pointer';
    item.innerHTML = `
      <div class="stop-dot" style="background:${DAY_COLORS[s.icon] || '#f59e0b'}"></div>
      <div class="stop-text">
        <div class="stop-name">${s.name}</div>
        ${s.t ? `<div class="stop-time">${s.t}</div>` : ''}
      </div>
    `;
    item.addEventListener('click', () => {
      map.setView([s.lat, s.lng], 10, {animate: true});
      // Find marker and open popup
      markers.forEach(m => {
        const ll = m.getLatLng();
        if (Math.abs(ll.lat - s.lat) < 0.01 && Math.abs(ll.lng - s.lng) < 0.01) {
          m.openPopup();
        }
      });
    });
    stopsDiv.appendChild(item);
  });

  header.addEventListener('click', () => {
    stopsDiv.classList.toggle('open');
    header.querySelector('.day-toggle').classList.toggle('open');
  });

  group.appendChild(header);
  group.appendChild(stopsDiv);
  sidebarEl.appendChild(group);
});

// Map
const map = L.map('map', {
  center: [38.5, -105],
  zoom: 5,
  zoomControl: true,
  attributionControl: false
});

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  maxZoom: 19,
  subdomains: 'abcd'
}).addTo(map);

// Collect marker refs
const markers = [];

// All stops as flat array for bounds
const allPts = [];

days.forEach((day, di) => {
  // Day route lines
  const pts = day.stops.filter(s => s.icon !== 'flight').map(s => [s.lat, s.lng]);
  if (pts.length > 1) {
    L.polyline(pts, {
      color: day.color,
      weight: 2,
      opacity: 0.35,
      dashArray: '8,8'
    }).addTo(map);
  }

  // Flight line for flight days
  const flightStops = day.stops.filter(s => s.icon === 'flight');
  if (flightStops.length > 0 && day.stops.length > 1) {
    const fromIdx = 0;
    const flightIdx = day.stops.findIndex(s => s.icon === 'flight');
    if (flightIdx > 0) {
      const from = day.stops[flightIdx - 1];
      const to = day.stops[flightIdx];
      L.polyline([[from.lat, from.lng], [to.lat, to.lng]], {
        color: '#06b6d4',
        weight: 1.5,
        opacity: 0.5,
        dashArray: '6,6'
      }).addTo(map);
    }
    // After flight
    if (flightIdx < day.stops.length - 1) {
      const from = day.stops[flightIdx];
      const to = day.stops[flightIdx + 1];
      L.polyline([[from.lat, from.lng], [to.lat, to.lng]], {
        color: day.color === '#ef4444' ? day.color : '#6366f1',
        weight: 2,
        opacity: 0.35,
        dashArray: '8,8'
      }).addTo(map);
    }
  }

  // Markers
  day.stops.forEach(s => {
    // Skip duplicates (Anaheim appears multiple times)
    const isDuplicate = allPts.some(p => Math.abs(p[0] - s.lat) < 0.01 && Math.abs(p[1] - s.lng) < 0.01);
    if (isDuplicate && s.icon === 'stay') return;

    allPts.push([s.lat, s.lng]);
    const pinClass = PIN_CLASS[s.icon] || 'pin-amber';
    const label = PIN_LABEL[s.icon] || '·';

    const icon = L.divIcon({
      className: '',
      html: `<div class="pin ${pinClass}">${label}</div>`,
      iconSize: [26, 26],
      iconAnchor: [13, 13],
      popupAnchor: [0, -16]
    });

    const marker = L.marker([s.lat, s.lng], {icon}).addTo(map);
    marker.bindPopup(`
      ${day.label.split('·')[0] ? `<div class="date">${day.label.split('·')[0].trim()}</div>` : ''}
      ${s.t ? `<div class="date">${s.t}</div>` : ''}
      <strong>${s.name}</strong>
      ${s.desc ? `<div class="desc">${s.desc.replace(/\n/g, '<br>')}</div>` : ''}
    `);
    markers.push(marker);
  });
});

// Global route lines between days
const dayRoutes = [
  // LA to Yellowstone flight
  {from: [33.8366,-117.9143], to: [33.9416,-118.4085], color: '#06b6d4'},
  {from: [33.9416,-118.4085], to: [44.6200,-110.4900], color: '#06b6d4'},
  // Yellowstone to St Paul flight
  {from: [44.6200,-110.4900], to: [44.9537,-93.0899], color: '#06b6d4'}
];
dayRoutes.forEach(r => {
  L.polyline([r.from, r.to], {
    color: r.color,
    weight: 1.5,
    opacity: 0.3,
    dashArray: '4,6'
  }).addTo(map);
});

// Legend
const legend = L.control({position: 'bottomleft'});
legend.onAdd = () => {
  const div = L.DomUtil.create('div');
  div.style.cssText = 'background:rgba(13,13,26,.9);border:1px solid rgba(255,255,255,.08);border-radius:8px;padding:10px 14px;font-size:11px;line-height:1.7';
  div.innerHTML = `
    <div style="color:#e0e0e0;font-weight:600;margin-bottom:4px;font-size:12px">图例</div>
    <div><span class="pin ${PIN_CLASS.start}" style="display:inline-flex;width:12px;height:12px;border-radius:3px;font-size:7px;margin-right:6px;vertical-align:middle">${PIN_LABEL.start}</span>起点/到达</div>
    <div><span class="pin ${PIN_CLASS.end}" style="display:inline-flex;width:12px;height:12px;border-radius:3px;font-size:7px;margin-right:6px;vertical-align:middle">${PIN_LABEL.end}</span>终点</div>
    <div><span class="pin ${PIN_CLASS.stay}" style="display:inline-flex;width:12px;height:12px;border-radius:3px;font-size:7px;margin-right:6px;vertical-align:middle">${PIN_LABEL.stay}</span>住宿</div>
    <div><span class="pin ${PIN_CLASS.day}" style="display:inline-flex;width:12px;height:12px;border-radius:3px;font-size:7px;margin-right:6px;vertical-align:middle">${PIN_LABEL.day}</span>景点/活动</div>
    <div><span class="pin ${PIN_CLASS.flight}" style="display:inline-flex;width:12px;height:12px;border-radius:3px;font-size:7px;margin-right:6px;vertical-align:middle">${PIN_LABEL.flight}</span>航班</div>
    <div><span class="pin ${PIN_CLASS.hospital}" style="display:inline-flex;width:12px;height:12px;border-radius:3px;font-size:7px;margin-right:6px;vertical-align:middle">${PIN_LABEL.hospital}</span>医院</div>
    <hr style="border-color:rgba(255,255,255,.08);margin:4px 0">
    <div style="display:flex;align-items:center;gap:6px"><span style="display:inline-block;width:16px;height:2px;background:#f59e0b;opacity:.5"></span>驾车路线</div>
    <div style="display:flex;align-items:center;gap:6px"><span style="display:inline-block;width:16px;height:0;border-top:1.5px dashed #06b6d4;opacity:.5"></span>飞行路线</div>
  `;
  return div;
};
legend.addTo(map);

// Fit bounds
const allBounds = allPts.map(p => L.marker(p));
map.fitBounds(L.featureGroup(allBounds).getBounds().pad(0.06));
</script>
</body>
</html>
